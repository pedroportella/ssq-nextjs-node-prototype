# DigitalOcean App Platform template for the shared SSQ backend API.
# Copy to .do/ssq-node-api.local.yml before replacing environment-specific values.

name: ssq-node-api
region: syd

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

ingress:
  rules:
    - component:
        name: api
      match:
        path:
          prefix: /

services:
  - name: api
    github:
      repo: pedroportella/ssq-nextjs-node-prototype
      branch: main
      deploy_on_push: false
    source_dir: /
    dockerfile_path: backend/Dockerfile
    run_command: sh -c "cd backend && pnpm db:migrate && pnpm db:seed && pnpm start"
    http_port: 7001
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health/ready
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 6
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
        type: GENERAL
      - key: HOST
        value: 0.0.0.0
        scope: RUN_TIME
        type: GENERAL
      - key: PORT
        value: "7001"
        scope: RUN_TIME
        type: GENERAL
      - key: LOG_LEVEL
        value: info
        scope: RUN_TIME
        type: GENERAL
      - key: APP_NAME
        value: ssq-node-api
        scope: RUN_TIME
        type: GENERAL
      - key: APP_VERSION
        value: 0.0.0
        scope: RUN_TIME
        type: GENERAL
      - key: DEBUG_ROUTES_ENABLED
        value: "false"
        scope: RUN_TIME
        type: GENERAL
      - key: CORS_ALLOWED_ORIGINS
        value: "https://ssq-dashboard.example.invalid,https://ssq-seniors-card.example.invalid,https://ssq-rental-security-subsidy.example.invalid"
        scope: RUN_TIME
        type: GENERAL
      - key: RATE_LIMIT_ENABLED
        value: "true"
        scope: RUN_TIME
        type: GENERAL
      - key: RATE_LIMIT_MAX
        value: "120"
        scope: RUN_TIME
        type: GENERAL
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
        scope: RUN_TIME
        type: GENERAL
      - key: DATABASE_URL
        value: "${ssq-prototype-db.DATABASE_URL}"
        scope: RUN_TIME
        type: GENERAL

databases:
  - name: ssq-prototype-db
    engine: PG
    version: "16"
