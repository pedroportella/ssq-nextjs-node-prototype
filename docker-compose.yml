name: ssq-nextjs-node-prototype

services:
  postgres:
    image: postgres:16-alpine
    container_name: ssq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ssq_prototype}
      POSTGRES_USER: ${POSTGRES_USER:-ssq_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssq_dev_password}
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - ssq-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssq-local

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ssq-node-api:local
    environment:
      NODE_ENV: ${BACKEND_NODE_ENV:-production}
      HOST: 0.0.0.0
      PORT: ${BACKEND_PORT:-7001}
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-info}
      APP_NAME: ssq-node-api
      APP_VERSION: ${APP_VERSION:-0.0.0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ssq_app}:${POSTGRES_PASSWORD:-ssq_dev_password}@postgres:5432/${POSTGRES_DB:-ssq_prototype}
    command: ["sh", "-c", "cd backend && pnpm db:migrate && pnpm db:seed && pnpm start"]
    ports:
      - "${BACKEND_PORT:-7001}:${BACKEND_PORT:-7001}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 7001) + '/health/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ssq-local

  dashboard:
    build:
      context: .
      dockerfile: frontend/apps/dashboard/Dockerfile
    image: ssq-dashboard:local
    environment:
      NODE_ENV: production
      PORT: ${DASHBOARD_PORT:-3000}
      HOSTNAME: 0.0.0.0
      SSQ_FRONTEND_DATA_SOURCE: ${SSQ_FRONTEND_DATA_SOURCE:-mock}
      BACKEND_INTERNAL_URL: http://backend:${BACKEND_PORT:-7001}
      DASHBOARD_PUBLIC_URL: ${DASHBOARD_PUBLIC_URL:-http://localhost:3000}
      SENIORS_CARD_PUBLIC_URL: ${SENIORS_CARD_PUBLIC_URL:-http://localhost:3001}
      RENTAL_SECURITY_SUBSIDY_PUBLIC_URL: ${RENTAL_SECURITY_SUBSIDY_PUBLIC_URL:-http://localhost:3002}
    ports:
      - "${DASHBOARD_PORT:-3000}:${DASHBOARD_PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/status').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ssq-local

  seniors-card:
    build:
      context: .
      dockerfile: frontend/apps/seniors-card/Dockerfile
    image: ssq-seniors-card:local
    environment:
      NODE_ENV: production
      PORT: ${SENIORS_CARD_PORT:-3001}
      HOSTNAME: 0.0.0.0
      SSQ_FRONTEND_DATA_SOURCE: ${SSQ_FRONTEND_DATA_SOURCE:-mock}
      BACKEND_INTERNAL_URL: http://backend:${BACKEND_PORT:-7001}
      DASHBOARD_PUBLIC_URL: ${DASHBOARD_PUBLIC_URL:-http://localhost:3000}
      SENIORS_CARD_PUBLIC_URL: ${SENIORS_CARD_PUBLIC_URL:-http://localhost:3001}
      RENTAL_SECURITY_SUBSIDY_PUBLIC_URL: ${RENTAL_SECURITY_SUBSIDY_PUBLIC_URL:-http://localhost:3002}
    ports:
      - "${SENIORS_CARD_PORT:-3001}:${SENIORS_CARD_PORT:-3001}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/status').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ssq-local

  rental-security-subsidy:
    build:
      context: .
      dockerfile: frontend/apps/rental-security-subsidy/Dockerfile
    image: ssq-rental-security-subsidy:local
    environment:
      NODE_ENV: production
      PORT: ${RENTAL_SECURITY_SUBSIDY_PORT:-3002}
      HOSTNAME: 0.0.0.0
      SSQ_FRONTEND_DATA_SOURCE: ${SSQ_FRONTEND_DATA_SOURCE:-mock}
      BACKEND_INTERNAL_URL: http://backend:${BACKEND_PORT:-7001}
      DASHBOARD_PUBLIC_URL: ${DASHBOARD_PUBLIC_URL:-http://localhost:3000}
      SENIORS_CARD_PUBLIC_URL: ${SENIORS_CARD_PUBLIC_URL:-http://localhost:3001}
      RENTAL_SECURITY_SUBSIDY_PUBLIC_URL: ${RENTAL_SECURITY_SUBSIDY_PUBLIC_URL:-http://localhost:3002}
    ports:
      - "${RENTAL_SECURITY_SUBSIDY_PORT:-3002}:${RENTAL_SECURITY_SUBSIDY_PORT:-3002}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3002) + '/status').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ssq-local

volumes:
  ssq-postgres-data:

networks:
  ssq-local:
    driver: bridge
